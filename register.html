<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - UniNest</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="glass-bg">
    <div class="border1">
<div class="logo3">
    <img src="images\lo.png" class="logo3-size">
    <h2>University of Vavuniya</h2>
</div>
<div class="auth-box2">
    <h2>Student Registration</h2>

    <form id="registerForm">
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="regno" placeholder="Registration Number">
        <input type="text" id="room" placeholder="Room Number">
        <input type="password" id="pass" placeholder="Password">
        <input type="password" id="cpass" placeholder="Confirm Password">
        <p class="error" id="regError"></p>
        <button type="submit">Register</button>
    </form>

    <p class="switch">
        Already registered? <a href="index.html">Login</a>
    </p>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
